<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8">
<style>
  *{box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(900px 500px at 70% -10%,#F4E6DA,#faf9f5 60%);color:#3A3A57}
  .card{text-align:center;padding:34px;max-width:420px}
  .ico{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#4B3F72,#1F2041);display:grid;place-items:center;margin:0 auto 16px;font-size:30px}
  h2{margin:0 0 8px;color:#1F2041}
  p{color:#6B6B80;font-size:14px;line-height:1.5}
  a.btn{display:inline-block;margin-top:18px;background:linear-gradient(135deg,#4B3F72,#1F2041);color:#fff;text-decoration:none;padding:12px 22px;border-radius:11px;font-weight:600}
</style></head>
<body>
  <div class="card">
    <div class="ico">📡</div>
    <h2>Sem conexão</h2>
    <p>Não foi possível carregar o painel. Verifique sua internet e tente novamente.</p>
    <a class="btn" href="https://eduarjn.github.io/era-calls-web/">↻ Tentar novamente</a>
  </div>
</body></html>
